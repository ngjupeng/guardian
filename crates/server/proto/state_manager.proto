syntax = "proto3";

package state_manager;

// Account state service
service StateManager {
  // Configure a new account
  rpc Configure(ConfigureRequest) returns (ConfigureResponse);

  // Submit a delta
  rpc PushDelta(PushDeltaRequest) returns (PushDeltaResponse);

  // Get a specific delta
  rpc GetDelta(GetDeltaRequest) returns (GetDeltaResponse);

  // Get the latest delta (head)
  rpc GetDeltaHead(GetDeltaHeadRequest) returns (GetDeltaHeadResponse);

  // Get account state
  rpc GetState(GetStateRequest) returns (GetStateResponse);
}

// Configure request
message ConfigureRequest {
  string account_id = 1;
  string auth_type = 2; // Auth type: "MidenFalconRpo", etc.
  string initial_state = 3; // JSON string
  string storage_type = 4;
  repeated string cosigner_pubkeys = 5;
}

message ConfigureResponse {
  bool success = 1;
  string message = 2;
}

// Push delta request
message PushDeltaRequest {
  string account_id = 1;
  uint64 nonce = 2;
  string prev_commitment = 3;
  string delta_hash = 4;
  string delta_payload = 5; // JSON string
  string ack_sig = 6;
  string publisher_pubkey = 7;
  string publisher_sig = 8;
  string candidate_at = 9;
  optional string canonical_at = 10;
  optional string discarded_at = 11;
}

message PushDeltaResponse {
  bool success = 1;
  string message = 2;
  DeltaObject delta = 3;
}

// Get delta request
message GetDeltaRequest {
  string account_id = 1;
  uint64 nonce = 2;
}

message GetDeltaResponse {
  bool success = 1;
  string message = 2;
  DeltaObject delta = 3;
}

// Get delta head request
message GetDeltaHeadRequest {
  string account_id = 1;
}

message GetDeltaHeadResponse {
  bool success = 1;
  string message = 2;
  optional uint64 latest_nonce = 3;
}

// Get state request
message GetStateRequest {
  string account_id = 1;
}

message GetStateResponse {
  bool success = 1;
  string message = 2;
  AccountState state = 3;
}

// Delta object
message DeltaObject {
  string account_id = 1;
  uint64 nonce = 2;
  string prev_commitment = 3;
  string delta_hash = 4;
  string delta_payload = 5; // JSON string
  string ack_sig = 6;
  string publisher_pubkey = 7;
  string publisher_sig = 8;
  string candidate_at = 9;
  optional string canonical_at = 10;
  optional string discarded_at = 11;
}

// Account state
message AccountState {
  string account_id = 1;
  string state_json = 2; // JSON string
  string commitment = 3;
  string created_at = 4;
  string updated_at = 5;
}

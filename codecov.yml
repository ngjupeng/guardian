coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
        informational: false
    patch:
      default:
        target: 90%
        threshold: 0%
        informational: false

comment:
  layout: "header, diff, flags, components, footer"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true

ignore:
  - "examples/**"
  - "crates/contracts/**"
  - "tests/**"
  - "**/testing/**"
  - "**/tests.rs"
  - "**/*_test.rs"
